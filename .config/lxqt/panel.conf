iconSize=100
lineCount=1
lockPanel=false
opacity=80
panelSize=100
plugins=mainmenu, quicklaunch, taskbar, statusnotifier, backlight, volume, worldclock, tray
position=Bottom
reserve-space=true
show-delay=0
visible-margin=true
width=100
